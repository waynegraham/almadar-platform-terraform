name: Strapi CI/CD

on:
  push:
    branches:
      - develop
      - main
      - "release/**"
    paths:
      - "apps/strapi/**"
      - "infrastructure/helm/strapi/**"
      - ".github/workflows/strapi.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  STRAPI_DIR: apps/strapi
  HELM_CHART: infrastructure/helm/strapi
  CI_VALUES_FILE: infrastructure/helm/strapi/values-ci.yaml
  RELEASE_NAME: almadar-strapi
  IMAGE_NAME: almadar-strapi

jobs:
  ci:
    name: Install dependencies and test
    runs-on: almadar-oci-oke
    defaults:
      run:
        working-directory: apps/strapi
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/strapi/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build and push image
    runs-on: almadar-oci-oke
    needs: ci
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}
      environment: ${{ steps.target.outputs.environment }}
      namespace: ${{ steps.target.outputs.namespace }}
      values_file: ${{ steps.target.outputs.values_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            environment="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            environment="prod"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            environment="dev"
          else
            environment="test"
          fi

          echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          echo "namespace=${environment}" >> "$GITHUB_OUTPUT"
          echo "values_file=infrastructure/helm/strapi/values-${environment}.yaml" >> "$GITHUB_OUTPUT"

      - name: Resolve image
        id: image
        run: |
          image="${{ vars.OCIR_REGISTRY }}/${{ vars.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}"
          tag="${{ steps.target.outputs.environment }}-${GITHUB_SHA}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps/strapi
          file: apps/strapi/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:${{ steps.target.outputs.environment }}-latest

  deploy:
    name: Run migrations and Helm deployment
    runs-on: almadar-oci-oke
    needs: build
    environment: ${{ needs.build.outputs.environment }}
    concurrency:
      group: strapi-${{ needs.build.outputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.OKE_KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Run migrations
        run: |
          helm upgrade --install "${{ env.RELEASE_NAME }}" "${{ env.HELM_CHART }}" \
            --namespace "${{ needs.build.outputs.namespace }}" \
            --create-namespace \
            --values "${{ needs.build.outputs.values_file }}" \
            --values "${{ env.CI_VALUES_FILE }}" \
            --set image.repository="${{ needs.build.outputs.image }}" \
            --set image.tag="${{ needs.build.outputs.tag }}" \
            --set migrations.enabled=true \
            --wait \
            --atomic \
            --timeout 10m

      - name: Helm deployment
        run: |
          helm status "${{ env.RELEASE_NAME }}" --namespace "${{ needs.build.outputs.namespace }}"
          kubectl rollout status deployment/"${{ env.RELEASE_NAME }}" \
            --namespace "${{ needs.build.outputs.namespace }}" \
            --timeout 5m
