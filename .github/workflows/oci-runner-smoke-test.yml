name: OCI runner smoke test

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Run on OCI OKE
    runs-on: almadar-oci-oke
    steps:
      - name: Show runner context
        run: |
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          uname -a
