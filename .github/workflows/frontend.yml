name: Frontend CI and image build

on:
  push:
    branches:
      - develop
      - main
      - "release/**"
    paths:
      - "apps/frontend/**"
      - "infrastructure/helm/frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  IMAGE_NAME: almadar-frontend

jobs:
  ci:
    name: Install dependencies and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}
      environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            environment="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            environment="prod"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            environment="dev"
          else
            environment="test"
          fi

          echo "environment=${environment}" >> "$GITHUB_OUTPUT"

      - name: Resolve image
        id: image
        run: |
          image="${{ vars.OCIR_REGISTRY }}/${{ vars.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}"
          tag="${{ steps.target.outputs.environment }}-${GITHUB_SHA}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:${{ steps.target.outputs.environment }}-latest
