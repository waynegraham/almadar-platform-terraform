apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: dev
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-strapi
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - until curl -fsS http://strapi:1337; do sleep 2; done
      containers:
        - name: frontend
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/apps/frontend
          command:
            - sh
            - -c
            - npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: development
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: FRONTEND_PORT
              value: "3000"
            - name: NEXT_PUBLIC_STRAPI_URL
              valueFrom:
                configMapKeyRef:
                  name: almadar-config
                  key: NEXT_PUBLIC_STRAPI_URL
            - name: STRAPI_INTERNAL_URL
              value: http://strapi:1337
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: frontend-source
              mountPath: /workspace/apps/frontend
            - name: frontend-node-modules
              mountPath: /workspace/apps/frontend/node_modules
            - name: frontend-next-cache
              mountPath: /workspace/apps/frontend/.next
      volumes:
        - name: frontend-source
          hostPath:
            path: /workspace/almadar-platform/apps/frontend
            type: Directory
        - name: frontend-node-modules
          emptyDir: {}
        - name: frontend-next-cache
          emptyDir: {}

