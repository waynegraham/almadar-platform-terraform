apiVersion: v1
kind: Service
metadata:
  name: cantaloupe
  namespace: dev
spec:
  type: NodePort
  selector:
    app: cantaloupe
  ports:
    - name: http
      port: 8182
      targetPort: 8182
      nodePort: 31820
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cantaloupe-cache
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cantaloupe
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cantaloupe
  template:
    metadata:
      labels:
        app: cantaloupe
    spec:
      initContainers:
        - name: wait-for-minio
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - until curl -fsS http://minio:9000/minio/health/ready; do sleep 2; done
      containers:
        - name: cantaloupe
          image: uclalibrary/cantaloupe:5.0.7-0
          imagePullPolicy: IfNotPresent
          env:
            - name: CONFIG_FILE
              value: /tmp/cantaloupe.properties
            - name: CANTALOUPE_S3SOURCE_ENDPOINT
              value: http://minio:9000
            - name: CANTALOUPE_S3SOURCE_REGION
              valueFrom:
                configMapKeyRef:
                  name: almadar-config
                  key: S3_REGION
            - name: CANTALOUPE_S3SOURCE_ACCESS_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: almadar-config
                  key: S3_ACCESS_KEY_ID
            - name: CANTALOUPE_S3SOURCE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: almadar-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: CANTALOUPE_S3SOURCE_BASICLOOKUPSTRATEGY_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: almadar-config
                  key: IIIF_BUCKET
            - name: CANTALOUPE_S3SOURCE_BASICLOOKUPSTRATEGY_PATH_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: almadar-config
                  key: CANTALOUPE_S3_PREFIX
            - name: CANTALOUPE_S3SOURCE_BASICLOOKUPSTRATEGY_PATH_SUFFIX
              valueFrom:
                configMapKeyRef:
                  name: almadar-config
                  key: CANTALOUPE_S3_SUFFIX
            - name: CANTALOUPE_CACHE_SERVER_DERIVATIVE_ENABLED
              value: "true"
            - name: CANTALOUPE_CACHE_SERVER_DERIVATIVE
              value: FilesystemCache
            - name: CANTALOUPE_FILESYSTEMCACHE_PATHNAME
              value: /var/cache/cantaloupe
          ports:
            - containerPort: 8182
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8182
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8182
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: cantaloupe-config
              mountPath: /etc/cantaloupe/cantaloupe.properties.tmpl
              subPath: cantaloupe.properties
            - name: cantaloupe-cache
              mountPath: /var/cache/cantaloupe
      volumes:
        - name: cantaloupe-config
          configMap:
            name: cantaloupe-config
        - name: cantaloupe-cache
          persistentVolumeClaim:
            claimName: cantaloupe-cache
