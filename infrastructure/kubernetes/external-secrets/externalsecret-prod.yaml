apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: almadar-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: almadar-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: almadar-prod-postgres
    - extract:
        key: almadar-prod-jwt
    - extract:
        key: almadar-prod-strapi
    - extract:
        key: almadar-prod-s3
