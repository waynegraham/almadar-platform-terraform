# Local Cantaloupe is configured from Docker Compose environment variables.
# The uclalibrary/cantaloupe image renders its runtime properties file from
# CANTALOUPE_* environment variables into CONFIG_FILE.
#
# Relevant local settings are in ../../docker-compose.yml:
#
# - CANTALOUPE_SOURCE_STATIC=S3Source
# - CANTALOUPE_S3SOURCE_ENDPOINT=${AWS_ENDPOINT}
# - CANTALOUPE_S3SOURCE_REGION=${AWS_REGION}
# - CANTALOUPE_S3SOURCE_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
# - CANTALOUPE_S3SOURCE_SECRET_KEY=${AWS_SECRET_ACCESS_KEY}
# - CANTALOUPE_S3SOURCE_BASICLOOKUPSTRATEGY_BUCKET_NAME=${IIIF_BUCKET}
#
# This file intentionally does not contain credentials.
