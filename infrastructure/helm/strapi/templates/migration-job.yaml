{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "strapi.fullname" . }}-migrate
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "strapi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "strapi.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.initContainers.enabled }}
      initContainers:
        {{- if .Values.initContainers.postgres.enabled }}
        - name: wait-for-postgres
          image: {{ .Values.initContainers.postgres.image }}
          command:
            - sh
            - -c
            - until pg_isready -h {{ .Values.initContainers.postgres.host }} -p {{ .Values.initContainers.postgres.port }}; do sleep 2; done
        {{- end }}
        {{- if .Values.initContainers.minio.enabled }}
        - name: wait-for-minio
          image: {{ .Values.initContainers.minio.image }}
          command:
            - sh
            - -c
            - until curl -fsS {{ .Values.initContainers.minio.url }}; do sleep 2; done
        {{- end }}
      {{- end }}
      containers:
        - name: migrate
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ .Values.workingDir | quote }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $name, $key := .Values.configMapEnv }}
            - name: {{ $name }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.externalConfig.configMapName }}
                  key: {{ $key }}
            {{- end }}
            {{- range $name, $key := .Values.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalConfig.secretName }}
                  key: {{ $key }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
