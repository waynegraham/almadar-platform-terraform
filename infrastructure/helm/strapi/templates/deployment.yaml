apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "strapi.fullname" . }}
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "strapi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "strapi.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "strapi.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.initContainers.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.initContainers.postgres.image }}
          command:
            - sh
            - -c
            - until pg_isready -h {{ .Values.initContainers.postgres.host }} -p {{ .Values.initContainers.postgres.port }}; do sleep 2; done
        - name: wait-for-minio
          image: {{ .Values.initContainers.minio.image }}
          command:
            - sh
            - -c
            - until curl -fsS {{ .Values.initContainers.minio.url }}; do sleep 2; done
      {{- end }}
      containers:
        - name: {{ include "strapi.name" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ .Values.workingDir | quote }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $name, $key := .Values.configMapEnv }}
            - name: {{ $name }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.externalConfig.configMapName }}
                  key: {{ $key }}
            {{- end }}
            {{- range $name, $key := .Values.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalConfig.secretName }}
                  key: {{ $key }}
            {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- omit .Values.probes.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- omit .Values.probes.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.volumes.source.enabled .Values.volumes.nodeModules.enabled }}
          volumeMounts:
            {{- if .Values.volumes.source.enabled }}
            - name: source
              mountPath: {{ .Values.volumes.source.mountPath }}
            {{- end }}
            {{- if .Values.volumes.nodeModules.enabled }}
            - name: node-modules
              mountPath: {{ .Values.volumes.nodeModules.mountPath }}
            {{- end }}
          {{- end }}
      {{- if or .Values.volumes.source.enabled .Values.volumes.nodeModules.enabled }}
      volumes:
        {{- if .Values.volumes.source.enabled }}
        - name: source
          hostPath:
            path: {{ .Values.volumes.source.hostPath }}
            type: Directory
        {{- end }}
        {{- if .Values.volumes.nodeModules.enabled }}
        - name: node-modules
          emptyDir: {}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

