environment: dev

replicaCount: 1

image:
  repository: node
  tag: "22-alpine"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

workingDir: /workspace/apps/strapi
command:
  - sh
  - -c
args:
  - npm ci && npm run develop

migrations:
  enabled: false
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  command:
    - npm
    - run
    - migrate

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 1337
  targetPort: 1337
  nodePort: null

containerPort: 1337

externalConfig:
  configMapName: almadar-config
  secretName: almadar-secrets

env:
  HOST: 0.0.0.0
  PORT: "1337"
  NODE_ENV: development
  DATABASE_CLIENT: postgres
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_SSL: "false"
  S3_ENDPOINT: http://minio:9000

configMapEnv:
  DATABASE_NAME: POSTGRES_DB
  DATABASE_USERNAME: POSTGRES_USER
  S3_ACCESS_KEY_ID: S3_ACCESS_KEY_ID
  S3_REGION: S3_REGION
  S3_BUCKET: S3_BUCKET
  S3_ACL: S3_ACL
  S3_SIGNED_URL_EXPIRES: S3_SIGNED_URL_EXPIRES
  S3_FORCE_PATH_STYLE: S3_FORCE_PATH_STYLE
  S3_ROOT_PATH: S3_ROOT_PATH
  S3_PUBLIC_BASE_URL: S3_PUBLIC_BASE_URL
  STRAPI_UPLOADS_CSP_SRC: STRAPI_UPLOADS_CSP_SRC

secretEnv:
  DATABASE_PASSWORD: POSTGRES_PASSWORD
  S3_SECRET_ACCESS_KEY: S3_SECRET_ACCESS_KEY
  APP_KEYS: APP_KEYS
  API_TOKEN_SALT: API_TOKEN_SALT
  ADMIN_JWT_SECRET: ADMIN_JWT_SECRET
  TRANSFER_TOKEN_SALT: TRANSFER_TOKEN_SALT
  JWT_SECRET: JWT_SECRET
  ENCRYPTION_KEY: ENCRYPTION_KEY

initContainers:
  enabled: true
  postgres:
    enabled: true
    image: postgres:17
    host: postgres
    port: 5432
  minio:
    enabled: true
    image: curlimages/curl:latest
    url: http://minio:9000/minio/health/ready

probes:
  readiness:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
  liveness:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 90
    periodSeconds: 20

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

volumes:
  source:
    enabled: true
    type: hostPath
    mountPath: /workspace/apps/strapi
    hostPath: /workspace/almadar-platform/apps/strapi
  nodeModules:
    enabled: true
    mountPath: /workspace/apps/strapi/node_modules

nodeSelector: {}
tolerations: []
affinity: {}
