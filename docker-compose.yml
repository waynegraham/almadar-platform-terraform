name: almadar-platform

services:
  postgres:
    image: postgres:17
    container_name: almadar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-almadar}
      POSTGRES_USER: ${POSTGRES_USER:-almadar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgresql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - almadar

  minio:
    image: minio/minio:latest
    container_name: almadar-minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-almadar}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - almadar

  minio-init:
    image: minio/mc:latest
    container_name: almadar-minio-init
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-almadar}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
      MINIO_ENDPOINT: http://minio:9000
      IIIF_BUCKET: ${IIIF_BUCKET:-iiif-dev}
      STRAPI_UPLOADS_BUCKET: ${STRAPI_UPLOADS_BUCKET:-strapi-dev}
      MINIO_BUCKETS: ${MINIO_BUCKETS:-iiif-dev,strapi-dev}
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infrastructure/minio/init-buckets.sh:/usr/local/bin/init-buckets.sh:ro
    entrypoint:
      - /usr/local/bin/init-buckets.sh
    networks:
      - almadar

  strapi:
    image: node:22-alpine
    container_name: almadar-strapi
    restart: unless-stopped
    working_dir: /workspace/apps/strapi
    command: sh -c "npm ci && npm run develop"
    environment:
      HOST: ${STRAPI_HOST:-0.0.0.0}
      PORT: ${STRAPI_PORT:-1337}
      APP_KEYS: ${APP_KEYS:-change-me-key-1,change-me-key-2}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-change-me-api-token-salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-admin-jwt-secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-change-me-transfer-token-salt}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-encryption-key}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-almadar}
      DATABASE_USERNAME: ${POSTGRES_USER:-almadar}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      DATABASE_SSL: "false"
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-almadar}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-change-me-minio-password}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-strapi-dev}
      S3_ACL: ${S3_ACL:-public-read}
      S3_SIGNED_URL_EXPIRES: ${S3_SIGNED_URL_EXPIRES:-900}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_ROOT_PATH: ${S3_ROOT_PATH:-uploads}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/strapi-dev}
      STRAPI_UPLOADS_CSP_SRC: ${STRAPI_UPLOADS_CSP_SRC:-http://localhost:9000}
      NODE_ENV: development
    ports:
      - "${STRAPI_PORT:-1337}:${STRAPI_PORT:-1337}"
    volumes:
      - ./apps/strapi:/workspace/apps/strapi
      - strapi_node_modules:/workspace/apps/strapi/node_modules
      - strapi_uploads:/workspace/apps/strapi/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const net=require('node:net');const s=net.connect(Number(process.env.PORT||1337),'127.0.0.1',()=>process.exit(0));s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - almadar

  frontend:
    image: node:22-alpine
    container_name: almadar-frontend
    restart: unless-stopped
    working_dir: /workspace/apps/frontend
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port $${FRONTEND_PORT}"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://localhost:1337}
      STRAPI_INTERNAL_URL: ${STRAPI_INTERNAL_URL:-http://strapi:1337}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - frontend_next_cache:/workspace/apps/frontend/.next
    depends_on:
      strapi:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const net=require('node:net');const s=net.connect(Number(process.env.FRONTEND_PORT||3000),'127.0.0.1',()=>process.exit(0));s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - almadar

  cantaloupe:
    image: uclalibrary/cantaloupe:5.0.7-0
    container_name: almadar-cantaloupe
    platform: linux/amd64
    restart: unless-stopped
    environment:
      CONFIG_FILE: /tmp/cantaloupe.properties
      CANTALOUPE_S3SOURCE_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      CANTALOUPE_S3SOURCE_REGION: ${S3_REGION:-us-east-1}
      CANTALOUPE_S3SOURCE_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-almadar}
      CANTALOUPE_S3SOURCE_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-change-me-minio-password}
      CANTALOUPE_S3SOURCE_LOOKUP_STRATEGY: BasicLookupStrategy
      CANTALOUPE_S3SOURCE_BASICLOOKUPSTRATEGY_BUCKET_NAME: ${IIIF_BUCKET:-iiif-dev}
      CANTALOUPE_S3SOURCE_BASICLOOKUPSTRATEGY_PATH_PREFIX: ${CANTALOUPE_S3_PREFIX:-}
      CANTALOUPE_S3SOURCE_BASICLOOKUPSTRATEGY_PATH_SUFFIX: ${CANTALOUPE_S3_SUFFIX:-}
      CANTALOUPE_S3SOURCE_CHUNKING_ENABLED: "true"
      CANTALOUPE_S3SOURCE_CHUNKING_CHUNK_SIZE: 512K
      CANTALOUPE_CACHE_SERVER_DERIVATIVE_ENABLED: "true"
      CANTALOUPE_CACHE_SERVER_DERIVATIVE: FilesystemCache
      CANTALOUPE_FILESYSTEMCACHE_PATHNAME: /var/cache/cantaloupe
    ports:
      - "${CANTALOUPE_PORT:-8182}:8182"
    volumes:
      - ./infrastructure/cantaloupe/cantaloupe.properties:/etc/cantaloupe/cantaloupe.properties.tmpl:ro
      - cantaloupe_cache:/var/cache/cantaloupe
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8182/health || curl -fsS http://localhost:8182/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - almadar

networks:
  almadar:
    name: almadar-local
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  strapi_node_modules:
  strapi_uploads:
  frontend_node_modules:
  frontend_next_cache:
  cantaloupe_cache:
